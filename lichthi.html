<!DOCTYPE html>
<html lang="vi">

<head>
    <script src="guard.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch thi KTHP</title>
    <link rel="icon" href="https://duytan.edu.vn/images/icon.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #d90429;
            --bg-light: #f8f9fa;
            --secondary-color: #c0392b;
            --btn-compact: #27ae60;
            --btn-full: #e67e22;
            --toast-bg: #333;
            --warn-bg: #fff3cd;
            --warn-border: #ffeeba;
            --warn-text: #856404;
            --conflict-row: #ffcccc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 98%;
            max-width: 1400px;
            height: 96vh;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1#dynamicTitle {
            color: var(--primary-color);
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            font-weight: 800;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        /* --- TỐI ƯU CHO DI ĐỘNG --- */
        .search-container {
            display: flex;
            flex-wrap: wrap;
            /* Cho phép xuống dòng trên điện thoại */
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            min-width: 280px;
            /* Đảm bảo ô nhập không quá nhỏ */
        }

        .input-count-prefix {
            background: #eee;
            color: var(--primary-color);
            font-weight: 800;
            height: 44px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            border-right: none;
            border-radius: 8px 0 0 8px;
            font-size: 16px;
            min-width: 35px;
        }

        input[type="text"] {
            flex: 1;
            height: 44px;
            padding: 0 10px;
            padding-right: 85px;
            border-radius: 0 8px 8px 0;
            border: 1px solid #ccc;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
            /* Trên điện thoại các nút sẽ chiếm hết chiều ngang */
        }

        @media (min-width: 768px) {
            .btn-group {
                width: auto;
            }

            /* Trên máy tính thì thu gọn lại */
        }

        .btn {
            flex: 1;
            /* Nút dàn đều trên điện thoại */
            padding: 0 15px;
            height: 44px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* -------------------------- */

        .clear-btn {
            position: absolute;
            right: 40px;
            background: #eee;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        #resultStats {
            position: absolute;
            right: 12px;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 14px;
            pointer-events: none;
            z-index: 5;
        }

        #toggleBtn {
            background: var(--btn-compact);
        }

        .copy-button {
            background: #a8aef4;
        }

        .table-wrapper {
            flex: 1;
            overflow: auto;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th,
        td {
            border-bottom: 1px solid #dee2e6;
            border-right: 1px solid #dee2e6;
            padding: 10px 8px;
            text-align: left;
            font-size: 13px;
        }

        thead th {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 11px;
        }

        .conflict-warning {
            margin-top: 10px;
            padding: 10px;
            background-color: var(--warn-bg);
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        #toast {
            visibility: hidden;
            min-width: 280px;
            background-color: var(--toast-bg);
            color: #fff;
            padding: 12px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #undoLink {
            color: #ffeb3b;
            text-decoration: underline;
            cursor: pointer;
            margin-left: 10px;
        }

        #toast.show {
            visibility: visible;
        }

        .export-header,
        .export-footer {
            display: none;
            text-align: center;
        }

        .table-wrapper.capturing .export-header,
        .table-wrapper.capturing .export-footer {
            display: block;
        }

        .disclaimer {
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="toast">
        <span id="toastMsg">Thông báo</span>
        <span id="undoLink" onclick="undoClear()" style="display:none;">HOÀN TÁC</span>
    </div>
    <div class="container">
        <h1 id="dynamicTitle">HỆ THỐNG TRA CỨU...</h1>

        <div class="search-container">
            <div class="input-wrapper">
                <div id="inputMonCount" class="input-count-prefix">0</div>
                <input type="text" id="searchTermInput" placeholder="Nhập mã môn..." oninput="handleSearchInput()"
                    onpaste="handlePaste(event)" autocomplete="off" />
                <button id="clearBtn" class="clear-btn" onclick="clearSearch()">✕</button>
                <div id="resultStats">0</div>
            </div>
            <div class="btn-group">
                <button id="toggleBtn" class="btn" onclick="toggleViewMode()">Rút gọn</button>
                <button class="btn copy-button" onclick="doCapture()">📸 Ảnh</button>
            </div>
        </div>

        <div class="table-wrapper" id="tableWrapper">
            <div id="captureArea" style="background: white; padding: 10px;">
                <div class="export-header">
                    <h2 id="exportTitleText" style="color:var(--primary-color); margin:0;"></h2>
                    <p id="exportTimeText" style="font-style:italic; color:#555; margin:5px 0 15px 0;"></p>
                </div>
                <table id="resultTable">
                    <thead></thead>
                    <tbody>
                        <tr>
                            <td colspan="100%" style="text-align:center; padding:30px;">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
                <div id="conflictWarning" class="conflict-warning"></div>
                <div id="exportFooter" class="export-footer"
                    style="margin-top:15px; font-size:12px; color:red; border-top:1px solid #eee; padding-top:10px; font-weight:bold;">
                    * Nội dung chỉ mang tính chất THAM KHẢO / LT: Phòng lý thuyết; PM: Phòng máy *
                </div>
            </div>
        </div>
    </div>

    <script>
        const EXAM_FILE_URL = 'https://raw.githubusercontent.com/adminweba/crack/main/LI%CC%A3CH%20THI%20KTHP.xlsx';
        let EXAM_DATA = [], HEADERS = [], isCompactView = false, lastSearchValue = "";

        document.addEventListener('DOMContentLoaded', () => { loadAndProcessFile(EXAM_FILE_URL); document.getElementById('searchTermInput').focus(); });

        async function loadAndProcessFile(url) {
            try {
                const response = await fetch(url);
                const data = await response.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                rows.slice(0, 10).forEach(row => { if (row) row.forEach(c => { if (String(c).includes("LỊCH THI")) document.getElementById('dynamicTitle').innerText = c; }); });
                let hIndex = -1;
                for (let i = 0; i < 30; i++) { if (rows[i] && rows[i].some(c => String(c).includes("Ngày"))) { hIndex = i; HEADERS = rows[i].map(h => String(h || '').trim()); break; } }
                EXAM_DATA = XLSX.utils.sheet_to_json(worksheet, { header: HEADERS, range: hIndex + 1, defval: "" }).filter(r => r[HEADERS[0]] && !isNaN(parseInt(r[HEADERS[0]])));
                searchData();
            } catch (e) { console.error(e); }
        }

        function showToast(msg, showUndo = false) {
            const t = document.getElementById("toast"), m = document.getElementById("toastMsg"), u = document.getElementById("undoLink");
            m.innerText = msg; u.style.display = showUndo ? "inline" : "none"; t.className = "show";
            if (window.toastTimer) clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => { t.className = ""; }, 4000);
        }

        function clearSearch() {
            const input = document.getElementById('searchTermInput');
            if (input.value.trim() === "") return;
            lastSearchValue = input.value; input.value = "";
            showToast("Đã xóa", true); handleSearchInput(); input.focus();
        }

        function undoClear() {
            const input = document.getElementById('searchTermInput');
            input.value = lastSearchValue; document.getElementById("toast").className = "";
            handleSearchInput(); input.focus();
        }

        function handlePaste(e) {
            const clipboardData = e.clipboardData || window.clipboardData;
            const pastedData = clipboardData.getData('Text');
            if (pastedData.includes('\n')) {
                e.preventDefault();
                const formattedData = pastedData.replace(/\r?\n/g, ', ');
                document.getElementById('searchTermInput').value = formattedData;
                handleSearchInput();
            }
        }

        function normalize(s) { return String(s || '').trim().toUpperCase().replace(/\s+/g, ' '); }

        function parseQuery(q) {
            const raw = normalize(q), parts = raw.split(' ');
            if (parts.length === 1) return { maMon: parts[0], khoi: '', isPartial: true };
            const lastPart = parts[parts.length - 1];
            if (!(/\d/.test(lastPart)) && parts.length >= 2) { const khoi = parts.pop(); return { maMon: parts.join(' '), khoi: khoi, isPartial: false }; }
            return { maMon: raw, khoi: '', isPartial: false };
        }

        function handleSearchInput() {
            const input = document.getElementById('searchTermInput'), clearBtn = document.getElementById('clearBtn'), countDisplay = document.getElementById('inputMonCount');
            clearBtn.style.display = input.value.length > 0 ? "flex" : "none";
            const rawValues = input.value.split(',').map(v => v.trim()).filter(Boolean);
            countDisplay.innerText = rawValues.length;
            const uniqueValues = [];
            let hasDuplicate = false;
            rawValues.forEach(v => {
                const normV = normalize(v);
                if (normV && uniqueValues.map(uv => normalize(uv)).includes(normV)) { hasDuplicate = true; } else if (normV) { uniqueValues.push(v); }
            });
            if (hasDuplicate) {
                input.value = uniqueValues.join(', ') + (input.value.endsWith(',') ? ', ' : '');
                showToast("⚠️ Đã lọc trùng!"); countDisplay.innerText = uniqueValues.length;
            }
            searchData();
        }

        function searchData() {
            const inputVal = document.getElementById('searchTermInput').value, queries = inputVal.split(',').map(q => q.trim()).filter(Boolean);
            const kMaMon = HEADERS.find(h => h.includes('Mã môn')), kKhoi = HEADERS.find(h => h.includes('Khối thi')), kNgay = HEADERS.find(h => h.includes('Ngày')), kGio = HEADERS.find(h => h.includes('Giờ'));
            let filtered = [];
            let notFound = [];
            if (queries.length === 0) { filtered = [...EXAM_DATA]; } else {
                queries.forEach(q => {
                    const { maMon, khoi, isPartial } = parseQuery(q);
                    const matches = EXAM_DATA.filter(row => {
                        const rowMaMon = normalize(row[kMaMon]), rowKhoiRaw = normalize(row[kKhoi]);
                        if (isPartial) return rowMaMon.startsWith(maMon);
                        if (rowMaMon !== maMon) return false;
                        if (khoi) { const inBracket = rowKhoiRaw.match(/\((.*?)\)/); return inBracket && inBracket[1].split('-').map(s => s.trim()).includes(khoi); }
                        return true;
                    });
                    if (matches.length > 0) filtered.push(...matches); else if (q.length > 3) notFound.push(q.toUpperCase());
                });
            }
            filtered = Array.from(new Set(filtered));
            filtered.sort((a, b) => { if (a[kNgay] !== b[kNgay]) return a[kNgay] - b[kNgay]; return String(a[kGio]).localeCompare(String(b[kGio])); });
            document.getElementById('resultStats').innerText = filtered.length;
            renderTable(filtered, queries, notFound, queries.length > 0);
        }

        function renderTable(data, queries, notFound, isSearching) {
            const tbody = document.querySelector('#resultTable tbody'), conflictDiv = document.getElementById('conflictWarning'), thead = document.querySelector('#resultTable thead');
            thead.innerHTML = ''; tbody.innerHTML = ''; conflictDiv.style.display = 'none';
            const kMaMon = HEADERS.find(h => h.includes('Mã môn')), kKhoi = HEADERS.find(h => h.includes('Khối thi')), kNgay = HEADERS.find(h => h.includes('Ngày')), kGio = HEADERS.find(h => h.includes('Giờ')), kMonThi = HEADERS.find(h => h.includes('Môn thi'));
            const compactTargets = ['STT', 'Ngày', 'Giờ', 'Khối thi', 'Địa điểm'];
            let cols = isCompactView ? HEADERS.filter(h => compactTargets.some(target => normalize(h).includes(normalize(target)))) : HEADERS;
            const trH = document.createElement('tr');
            cols.forEach(c => { const th = document.createElement('th'); th.textContent = c; trH.appendChild(th); });
            thead.appendChild(trH);
            let counts = {}, scheduleMap = {};
            if (isSearching) {
                data.forEach(row => {
                    const ngay = typeof row[kNgay] === 'number' ? excelDate(row[kNgay]) : row[kNgay], gio = row[kGio], key = `${ngay} | ${gio}`;
                    counts[key] = (counts[key] || 0) + 1;
                    if (!scheduleMap[key]) scheduleMap[key] = []; scheduleMap[key].push(`[${row[kMaMon]}] ${row[kMonThi] || ''}`);
                });
            }
            data.forEach(row => {
                const tr = document.createElement('tr'), ngay = typeof row[kNgay] === 'number' ? excelDate(row[kNgay]) : row[kNgay], gio = row[kGio], key = `${ngay} | ${gio}`;
                if (isSearching && counts[key] > 1) tr.style.backgroundColor = 'var(--conflict-row)';
                const rowMaMon = normalize(row[kMaMon]);
                cols.forEach(c => {
                    const td = document.createElement('td'); let val = row[c];
                    if (c.includes('Ngày') && typeof val === 'number') val = excelDate(val);
                    if (c === kKhoi) {
                        const myQuery = queries.map(q => parseQuery(q)).find(pq => pq.maMon === rowMaMon);
                        if (myQuery && myQuery.khoi && String(val).includes(myQuery.khoi)) { td.innerHTML = String(val).replace(new RegExp(`\\b${myQuery.khoi}\\b`, 'g'), `<mark>${myQuery.khoi}</mark>`); td.classList.add('highlight-khoithi'); } else { td.textContent = val; }
                    } else { td.textContent = val; }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            if (isSearching) {
                let conflictKeys = Object.keys(counts).filter(k => counts[k] > 1);
                if (conflictKeys.length > 0) {
                    let warnContent = `<strong style="color:red;">⚠️ PHÁT HIỆN TRÙNG LỊCH THI:</strong><br>`;
                    conflictKeys.forEach(k => { warnContent += `• <b>${k}</b>: Trùng giữa ${scheduleMap[k].join(' và ')}<br>`; });
                    conflictDiv.innerHTML = warnContent; conflictDiv.style.display = 'block';
                }
            }
            if (notFound.length > 0) { tbody.innerHTML += `<tr><td colspan="${cols.length}" style="text-align:center; color:blue; padding:20px; font-weight:bold;">Không tìm thấy (${notFound.length}): ${notFound.join(', ')}</td></tr>`; }
        }

        function excelDate(s) { const d = new Date((s - 25569) * 86400 * 1000); return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`; }
        function toggleViewMode() { isCompactView = !isCompactView; document.getElementById('toggleBtn').innerText = isCompactView ? "Đầy đủ" : "Rút gọn"; searchData(); }
        function doCapture() {
            const wrapper = document.getElementById('tableWrapper'); const now = new Date();
            document.getElementById('exportTitleText').innerText = document.getElementById('dynamicTitle').innerText;
            document.getElementById('exportTimeText').innerText = `Tra cứu lúc: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} - ${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
            wrapper.classList.add('capturing'); document.getElementById('tableWrapper').scrollTop = 0;
            html2canvas(document.getElementById('captureArea'), { scale: 2, useCORS: true }).then(canvas => {
                wrapper.classList.remove('capturing'); canvas.toBlob(blob => { const item = new ClipboardItem({ "image/png": blob }); navigator.clipboard.write([item]).then(() => showToast("✅ Đã chụp ảnh!")); });
            });
        }
    </script>
</body>

</html>
