<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: #fff; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { background: #fff; width: 100%; max-width: 380px; text-align: center; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-shopee { background: #ee4d2d; color: white; }
        .btn-verify { background: #202124; color: white; }
        .btn-verify:disabled { background: #dadce0; cursor: not-allowed; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #f1f3f4; border-radius: 10px; font-size: 16px; text-align: center; outline: none; }
        input:focus { border-color: #1a73e8; }
        .timer-box { font-size: 40px; font-weight: 900; color: #d93025; margin: 10px 0; font-family: monospace; }
        .hidden { display: none !important; }
        .captcha-box { background: #fdfdfd; padding: 10px; border-radius: 15px; border: 1px solid #eee; margin: 10px 0; }
        canvas { border-radius: 10px; width: 100%; max-width: 220px; height: auto; cursor: pointer; }
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 0.6s linear infinite; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-start">
        <p id="greeting" style="font-weight: bold; color: #1a73e8;"></p>
        <h2>Nhận tài khoản</h2>
        <button class="btn btn-primary" id="btn-start" onclick="initTask()">
            <span id="txt-start">BẮT ĐẦU</span>
            <div id="load-start" class="loader hidden"></div>
        </button>
    </div>

    <div id="ui-task" class="hidden">
        <button class="btn btn-shopee" onclick="openShopee()">MỞ SHOPEE</button>
        <div class="captcha-box">
            <canvas id="captchaCanvas" width="220" height="80" onclick="drawCaptcha()"></canvas>
            <input type="text" id="captcha-input" placeholder="Mã Captcha" autocomplete="off">
        </div>
        <input type="text" id="code-input" placeholder="Nhập 2 từ đầu tên sản phẩm" autocomplete="off">
        <button class="btn btn-verify" id="btn-verify" onclick="confirmTask()" disabled>XÁC NHẬN (30S)</button>
    </div>

    <div id="ui-result" class="hidden">
        <h3 style="color: #2ecc71;">THÀNH CÔNG</h3>
        <p style="font-size:14px; color:#555;">Đang tiến hành tự động đăng nhập hệ thống trong giây lát...</p>
        <div class="timer-box" id="clock">15:00</div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycby98erd1BYoAJO2eMNU3wwHSkyGOkO10SMyRrH4VxwAsRBHizGg7tN3csRdPoUoDon8SA/exec";
    
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => { if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode == 85)) return false; };

    const hour = new Date().getHours();
    document.getElementById('greeting').innerText = hour < 12 ? "Chào buổi sáng! ☀️" : hour < 18 ? "Chào buổi chiều! ⛅" : "Chào buổi tối! 🌙";

    // Khởi tạo và đồng bộ mã thiết bị ngẫu nhiên duy nhất
    let myId = localStorage.getItem('dtu_vfinal') || ('ID-' + Math.random().toString(36).substr(2, 9).toUpperCase());
    localStorage.setItem('dtu_vfinal', myId);
    let taskData = {}, captchaVal = "";

    function drawCaptcha() {
        const canvas = document.getElementById('captchaCanvas');
        const ctx = canvas.getContext('2d');
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        captchaVal = ""; ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < 5; i++) {
            let c = chars.charAt(Math.floor(Math.random() * chars.length));
            captchaVal += c;
            ctx.font = "bold 38px Arial";
            ctx.fillStyle = "#333";
            ctx.save(); ctx.translate(40 * i + 30, 50); ctx.rotate((Math.random() - 0.5) * 0.3);
            ctx.fillText(c, 0, 0); ctx.restore();
        }
    }

    async function initTask() {
        document.getElementById('txt-start').classList.add('hidden');
        document.getElementById('load-start').classList.remove('hidden');
        try {
            const res = await axios.get(`${API}?action=getTask&id=${myId}`);
            if (res.data.status === "ACTIVE") { 
                renderResult(res.data.acc, res.data.pass, res.data.exp); 
            } else { 
                taskData = res.data; 
                document.getElementById('ui-start').classList.add('hidden'); 
                document.getElementById('ui-task').classList.remove('hidden'); 
                drawCaptcha(); 
            }
        } catch (e) { alert("Lỗi kết nối!"); location.reload(); }
    }

function openShopee() {
        window.open(taskData.link, '_blank');
        let sec = 30;
        const btn = document.getElementById('btn-verify');
        const itv = setInterval(() => {
            sec--; 
            btn.innerText = `XÁC NHẬN (${sec}s)`;
            if (sec <= 0) { 
                clearInterval(itv); 
                btn.disabled = false; 
                btn.innerText = "ĐANG TỰ ĐỘNG XÁC NHẬN..."; 
                
                // TỰ ĐỘNG KÍCH HOẠT HÀM XÁC NHẬN NGAY KHI HẾT 30 GIÂY
                confirmTask(); 
            }
        }, 1000);
    }

    function confirmTask() {
        const uCap = document.getElementById('captcha-input').value.trim().toUpperCase();
        const uCode = document.getElementById('code-input').value.trim().toUpperCase();
        if (uCap !== captchaVal) { alert("Sai Captcha!"); drawCaptcha(); return; }
        
        const clean = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/Đ/g, "D").toUpperCase();
        
        if (clean(uCode).includes(taskData.correctCode)) {
            // Hiển thị trạng thái đang tạo tài khoản và chuyển giao diện kết quả
            renderResult("Đang tạo...", "...", Date.now() + 900000); // 15 phút = 900.000 ms
            axios.get(`${API}?action=saveAcc&id=${myId}`).then(res => {
                // Gửi dữ liệu tài khoản và mật khẩu bí mật về trang cha login.html thực hiện đăng nhập ngầm
                window.parent.postMessage({
                    action: "autoLogin",
                    user: res.data.acc,
                    pass: res.data.pass
                }, "*");
            });
        } else { alert("Mã sản phẩm không đúng!"); }
    }

    function renderResult(acc, pass, exp) {
        document.getElementById('ui-start').classList.add('hidden');
        document.getElementById('ui-task').classList.add('hidden');
        document.getElementById('ui-result').classList.remove('hidden');
        
        // Nếu là tài khoản còn hạn cũ được load ngay từ đầu
        if(acc !== "Đang tạo..." && pass !== "...") {
            window.parent.postMessage({
                action: "autoLogin",
                user: acc,
                pass: pass
            }, "*");
        }
        
        const updateClock = () => {
            let d = Math.floor((exp - Date.now()) / 1000);
            if (d <= 0) { document.getElementById('clock').innerText = "00:00"; return; }
            let minutes = Math.floor(d / 60).toString().padStart(2, '0');
            let seconds = (d % 60).toString().padStart(2, '0');
            document.getElementById('clock').innerText = minutes + ":" + seconds;
            requestAnimationFrame(updateClock);
        };
        updateClock();
    }
</script>
</body>
</html>
