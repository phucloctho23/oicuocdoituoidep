<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng nhập - Hỗ trợ DTU</title>
    <link rel="icon" href="logoo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #a32026; --secondary: #24A1DE; --bg: #fdf2f2; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { width: 100%; max-width: 850px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); text-align: center; flex: 1; min-width: 280px; display: flex; flex-direction: column; justify-content: center; }
        h2, h3 { color: var(--primary); margin: 0 0 15px 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 16px; }
        input:focus { border-color: var(--primary); }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-login:active { transform: scale(0.98); }
        .price-tag { background: #fff5f5; color: var(--primary); padding: 10px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; border: 1px solid #ffcccc; }
        .qr-code { width: 100%; max-width: 160px; margin: 10px auto; border: 2px solid #eee; border-radius: 10px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .btn-contact { text-decoration: none; color: white; padding: 10px; border-radius: 25px; font-size: 12px; font-weight: bold; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; border: none; cursor: pointer; min-width: 100px; }
        
        /* Modal Style */
        #registerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; backdrop-filter: blur(5px); }
        .modal-content { position: relative; width: 95%; max-width: 420px; margin: 2vh auto; background: #fff; border-radius: 20px; overflow: hidden; animation: slideUp 0.3s ease-out; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 35px; cursor: pointer; color: #333; z-index: 100; font-weight: bold; }
        iframe { width: 100%; height: 85vh; border: none; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h2>Nhật Tân</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="username">
                <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
                <button type="submit" class="btn-login" id="btnLogin">ĐĂNG NHẬP</button>
            </form>
        </div>

        <div class="box">
            <h3>Đăng ký tài khoản</h3>
                <div class="price-tag">Phí dịch vụ: <br>
                14.000 VNĐ / 3 ngày <br>
                38.000 VNĐ / 7 ngày <br>
                69.000 VNĐ / 29 ngày <br>
            Lưu ý: Nội dung: ghi rõ họ và tên và khóa học</div>
            <img src="maqrtan.jpg" class="qr-code" alt="QR Payment"> 
            <div class="btn-group">
                <a href="https://t.me/caulatatca" target="_blank" class="btn-contact" style="background:var(--secondary)"><i class="fab fa-telegram"></i> Gửi bill</a>
                <a href="https://hotrosvdtu.vercel.app/" target="_blank" class="btn-contact" style="background:#555"><i class="fas fa-question-circle"></i> Hỗ trợ</a>
                <a href="https://t.me//s/Dai_Hoc_Duy_Tan/49" target="_blank" class="btn-contact" style="background:var(--secondary)"><i class="fab fa-telegram"></i> Mô tả</a>
                <button type="button" onclick="openRegister()" class="btn-contact" style="background:#28a745"><i class="fas fa-cogs"></i> Tự đăng ký</button>
            </div>
        </div>
    </div>

    <div id="registerModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRegister()">&times;</span>
            <iframe src="captaikhoan.html"></iframe>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwSAyaK9u7-BtvPWg3Ji8PCSVkYDJN-k-5N83j91EeqYUF79K9bsaPmsq6fY7vMh5FV1w/exec";

        // BẢO MẬT: Chặn F12, Chuột phải, Ctrl+U
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && [85, 83].includes(e.keyCode))) return false;
        };

        // Điều khiển Modal
        function openRegister() { document.getElementById('registerModal').style.display = 'block'; document.body.style.overflow = 'hidden'; }
        function closeRegister() { document.getElementById('registerModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onclick = function(e) { if (e.target == document.getElementById('registerModal')) closeRegister(); }

        // Xử lý Đăng nhập
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('btnLogin');

            btn.innerText = "⏳ Đang kiểm tra...";
            btn.disabled = true;

            try {
                const res = await fetch(`${SCRIPT_URL}?action=checkLogin&u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`);
                const status = await res.text();

                if (status === "SUCCESS") {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "index.html";
                } else {
                    alert("❌ Sai tài khoản hoặc mật khẩu!");
                    btn.innerText = "ĐĂNG NHẬP";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("⚠️ Lỗi kết nối Server!");
                btn.innerText = "ĐĂNG NHẬP";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
