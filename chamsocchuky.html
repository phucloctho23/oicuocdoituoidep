<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhật ký bản thân</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <style>
    /* Font chữ mềm mại hơn cho tiêu đề */
    h1,
    h2,
    h3,
    .section-title {
      font-family: 'Quicksand', sans-serif;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #fff0f5 0%, #f3e8ff 100%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: #333;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .form-container,
    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      box-sizing: border-box;
      background: transparent;
      box-shadow: none;
      border: none;
      backdrop-filter: none;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-top: 1rem;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: #be185d;
      font-weight: 800;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(190, 24, 93, 0.1);
    }

    header p {
      color: #831843;
      font-size: 1.1rem;
    }

    .card {
      background: transparent;
      box-shadow: none;
      border: none;
      padding: 0;
      margin-bottom: 2rem;
    }

    .section-title {
      display: flex;
      align-items: center;
      font-weight: 700;
      color: #9d174d;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .icon {
      margin-right: 0.8rem;
      color: #db2777;
      font-size: 1.3rem;
      background: transparent;
      padding: 0;
      width: auto;
      height: auto;
    }

    .input-field,
    .select-field {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background-color: rgba(255, 255, 255, 0.8);
      color: #374151;
      font-size: 16px;
      box-sizing: border-box;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
      transition: all 0.3s ease;
    }

    .input-field:focus,
    .select-field:focus {
      outline: none;
      background-color: #fff;
      border-color: #f472b6;
      box-shadow: 0 4px 15px rgba(244, 114, 182, 0.2);
      transform: translateY(-2px);
    }

    .checkbox-label,
    .radio-label {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px 5px;
      border-radius: 16px;
      background-color: transparent;
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: #444;
      cursor: pointer;
      user-select: none;
      font-size: 0.9rem;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
      width: 100%;
      box-sizing: border-box;
      min-height: 50px;
    }

    .checkbox-label input,
    .radio-label input {
      display: none;
    }

    .checkbox-label:hover,
    .radio-label:hover {
      background-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }

    .checkbox-label:has(input:checked),
    .radio-label:has(input:checked) {
      background-color: #db2777;
      color: white;
      border-color: #db2777;
      box-shadow: 0 8px 15px rgba(219, 39, 119, 0.3);
      transform: translateY(-2px) scale(1.02);
      font-weight: 600;
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .radio-label {
      justify-content: center;
    }

    @media (min-width: 600px) {
      .radio-group {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .radio-label {
        flex: 1;
      }
    }

    @media (min-width: 900px) {
      .checkbox-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }

      .form-container {
        padding-top: 3rem;
      }
    }

    .submit-button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(to right, #ec4899, #d946ef);
      color: #fff;
      font-weight: 700;
      border-radius: 99px;
      border: none;
      font-size: 1.1rem;
      box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3);
      cursor: pointer;
      margin-top: 2rem;
      transition: transform 0.2s;
    }

    @media (min-width: 600px) {
      .submit-button {
        width: auto;
        padding: 1rem 4rem;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
    }

    .submit-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px rgba(236, 72, 153, 0.4);
    }

    .submit-button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .message-box {
      background: #fbcaca;
      border-radius: 15px;
      padding: 1rem;
      border-left: 5px solid #d946ef;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      margin-top: 2rem;
    }

    .back-button {
      display: inline-block;
      text-decoration: none;
      color: #db2777;
      font-weight: 700;
      margin-top: 2rem;
      padding: 10px 20px;
      background: #ffdada;
      border-radius: 99px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }

    .animate-fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

  <script>
    const form = document.getElementById("healthForm");
    const submitBtn = form.querySelector(".submit-button");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      // 1. Hiệu ứng nút bấm
      submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang tìm giải pháp...';
      submitBtn.disabled = true;
      submitBtn.classList.add("opacity-75", "cursor-wait");

      const formData = new FormData(form);
      const data = {};

      data["⏰ Dấu thời gian"] = new Date().toLocaleString("vi-VN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false,
      });

      // Thu thập dữ liệu
      data["👤 Họ và tên"] = formData.get("fullName") || "Vô danh";
      data["Hôm nay cảm thấy thế nào"] = formData.get("feelings") || "Không có";
      data["Lượng kinh nguyệt"] = formData.get("menstrualFlow") || "Không có";
      data["Cân nặng (kg)"] = formData.get("weight") ? formData.get("weight") + " kg" : "Không có";
      data["Thuốc tránh thai đường uống (OC)"] = formData.get("ocp") || "Không có";
      data["Thuốc ngoài"] = formData.get("medication") || "Không có";
      data["Chất lượng giấc ngủ"] = formData.get("sleepQuality") || "Không có";
      data["Ghi chú"] = formData.get("notes") || "Không có";

      // Hàm lấy danh sách checkbox
      const checkedValues = (name) => {
        const values = formData.getAll(name);
        return values.length > 0 ? values : ["Không có"];
      };

      data["Tâm trạng"] = checkedValues("moods");
      data["Triệu chứng"] = checkedValues("symptoms");
      data["Tiêu hóa và chất thải"] = checkedValues("digestion");
      data["Khác"] = checkedValues("other");
      data["Hoạt động thể chất"] = checkedValues("exercise");
      data["Hoạt động tình dục và nhu cầu tình dục"] = checkedValues("sexualActivity");
      data["Tiết dịch âm đạo"] = checkedValues("vaginalDischarge");
      data["Dấu hiệu rụng trứng"] = checkedValues("ovulationSigns");

      try {
        const advice = generateAdvice(data);
        const telegramMessage = formatDataForTelegram(data, advice);

        // Lưu dữ liệu
        localStorage.setItem("healthDataName", data["👤 Họ và tên"]);
        localStorage.setItem("healthAdvice", advice);
        localStorage.setItem("pendingTelegramMessage", telegramMessage);

        // Chuyển trang
        setTimeout(() => {
          window.location.href = "results.html";
        }, 500);

      } catch (error) {
        console.error("Lỗi:", error);
        alert("Có lỗi xử lý, bạn thử lại nhé!");
        submitBtn.innerHTML = 'Thử lại';
        submitBtn.disabled = false;
      }
    });

    function formatDataForTelegram(data, advice) {
      let message = `📝 Cập nhật Sức khỏe mới nhất:\n\n`;
      for (const key in data) {
        if (data.hasOwnProperty(key)) {
          let value = data[key];
          if (Array.isArray(value)) value = value.join(", ");
          
          if (value !== "Không có") {
            message += `- ${key}: ${value}\n`;
          }
        }
      }
      message += `\n💡 Lời khuyên và giải pháp:\n`;
      if (advice) {
        const adviceLines = advice.split('\n');
        for (const line of adviceLines) {
          if (line.trim() !== '') message += `- ${line}\n`;
        }
      }
      return message;
    }

    function generateAdvice(rowData) {
      let adviceList = new Set();
      const addAdvice = (condition, advice) => {
        if (condition) adviceList.add(advice);
      };
      
      const symptoms = rowData["Triệu chứng"];
      const moods = rowData["Tâm trạng"];
      const digestion = rowData["Tiêu hóa và chất thải"];
      const exercise = rowData["Hoạt động thể chất"];
      const sexual = rowData["Hoạt động tình dục và nhu cầu tình dục"];
      const vaginalDischargeData = rowData["Tiết dịch âm đạo"];
      const ovulationSigns = rowData["Dấu hiệu rụng trứng"];

      // 🎯 Cảm giác chung
      addAdvice(rowData['Hôm nay cảm thấy thế nào'] === "Tốt", "Bạn đang có một ngày tốt lành, hãy tận hưởng nó!");
      addAdvice(rowData['Hôm nay cảm thấy thế nào'] === "Bình thường", "Cơ thể bạn đang ổn định, hãy duy trì lối sống lành mạnh.");
      addAdvice(rowData['Hôm nay cảm thấy thế nào'] === "Không tốt", "Bạn đang cảm thấy không khỏe, hãy nghỉ ngơi và theo dõi thêm.");

      // 🎯 Triệu chứng
      symptoms.forEach(s => {
          if (s === "Mọi thứ đều ổn") addAdvice(true, "Tuyệt vời! Hãy tiếp tục duy trì lối sống lành mạnh.");
          if (s === "Chuột rút") addAdvice(true, "Hãy thử chườm ấm hoặc massage nhẹ để giảm đau bụng.");
          if (s === "Sưng đau ngực") addAdvice(true, "Có thể do thay đổi nội tiết, nếu kéo dài hãy tham khảo bác sĩ.");
          if (s === "Đau đầu") addAdvice(true, "Uống đủ nước và nghỉơi, hạn chế tiếp xúc ánh sáng mạnh.");
          if (s === "Mụn") addAdvice(true, "Chú ý vệ sinh da mặt và hạn chế đồ ăn dầu mỡ.");
          if (s === "Đau lưng") addAdvice(true, "Kéo giãn cơ và giữ tư thế đúng khi ngồi.");
          if (s === "Mệt mỏi") addAdvice(true, "Nghỉ ngơi hợp lý và bổ sung thực phẩm giàu năng lượng.");
          if (s === "Thèm ăn") addAdvice(true, "Hãy ưu tiên thực phẩm lành mạnh như trái cây, hạt, rau xanh thay vì đồ ngọt và dầu mỡ.");
          if (s === "Mất ngủ") addAdvice(true, "Thư giãn trước khi ngủ, tránh dùng điện thoại quá nhiều.");
          if (s === "Đau bụng") addAdvice(true, "Hãy thử chườm ấm, nghỉ ngơi và uống đủ nước. Nếu đau kéo dài hãy tham khảo ý kiến bác sĩ.");
          if (s === "Ngứa âm đạo" || s === "Khô âm đạo") addAdvice(true, "Có thể là dấu hiệu nhiễm khuẩn hoặc thay đổi nội tiết, nếu kéo dài hãy đi khám phụ khoa.");
      });

      // 🎯 Tâm trạng
      moods.forEach(m => {
          if (["Buồn", "Trầm cảm", "Lo lắng"].includes(m)) addAdvice(true, "Nếu cảm giác này kéo dài, hãy tìm sự hỗ trợ từ chuyên gia tâm lý.");
          if (m === "Thiếu năng lượng") addAdvice(true, "Hãy chú ý ngủ đủ giấc và ăn uống đầy đủ dinh dưỡng.");
          if (m === "Bực bội" || m === "Căng thẳng") addAdvice(true, "Hãy thử thiền hoặc tập thở để giảm stress.");
          if (m === "Cảm thấy có lỗi") addAdvice(true, "Hãy học cách tha thứ cho bản thân, ai cũng có lúc mắc sai lầm.");
          if (m === "Rất hay tự trách mình") addAdvice(true, "Thay vì trách bản thân, hãy tập trung vào cách cải thiện tình huống.");
          if (m === "Suy nghĩ ám ảnh") addAdvice(true, "Hãy thử viết nhật ký hoặc chia sẻ với người tin tưởng.");
          if (m === "Bối rối") addAdvice(true, "Hãy dành thời gian tạm dừng, sắp xếp lại suy nghĩ và ưu tiên việc quan trọng.");
          if (m === "Lãnh đạm") addAdvice(true, "Thử làm một hoạt động mới mẻ để tìm lại hứng thú.");
          if (["Bình tĩnh", "Vui vẻ", "Mạnh mẽ", "Phấn chấn"].includes(m)) addAdvice(true, "Hãy tiếp tục duy trì năng lượng tích cực này!");
      });

      // 🎯 Tiêu hóa và chất thải
      digestion.forEach(d => {
          if (d === "Bình thường") addAdvice(true, "Hệ tiêu hóa hoạt động tốt, hãy tiếp tục duy trì chế độ ăn uống lành mạnh.");
          if (d === "Buồn nôn") addAdvice(true, "Hãy nghỉ ngơi, uống nước ấm từng ngụm nhỏ và tránh thức ăn nhiều dầu mỡ.");
          if (d === "Đầy hơi") addAdvice(true, "Hạn chế đồ uống có ga và ăn chậm nhai kỹ.");
          if (d === "Táo bón") addAdvice(true, "Uống nhiều nước và bổ sung chất xơ.");
          if (d === "Tiêu chảy") addAdvice(true, "Bổ sung nước, oresol để tránh mất nước.");
      });

      // 🎯 Kinh nguyệt
      if (rowData['Lượng kinh nguyệt'] === "Bình thường") addAdvice(true, "Kinh nguyệt ổn định, hãy duy trì chế độ ăn uống và nghỉ ngơi hợp lý.");
      if (rowData['Lượng kinh nguyệt'] === "Nhiều") addAdvice(true, "Nếu ra máu nhiều, hãy bổ sung sắt và theo dõi tình trạng.");
      if (rowData['Lượng kinh nguyệt'] === "Ít") addAdvice(true, "Theo dõi chu kỳ tiếp theo, nếu bất thường hãy đi khám.");
      if (rowData['Lượng kinh nguyệt'] === "Cục máu đông") addAdvice(true, "Nếu có cục máu đông lớn, nên tham khảo bác sĩ.");

      // 🎯 Hoạt động thể chất
      if (exercise.includes("Không tập")) addAdvice(true, "Hãy vận động nhẹ như đi bộ để cơ thể khỏe mạnh.");
      if (exercise.includes("Yoga")) addAdvice(true, "Yoga rất tốt để giảm căng thẳng và tăng dẻo dai.");
      if (exercise.includes("Gym")) addAdvice(true, "Hãy kết hợp tập luyện với dinh dưỡng hợp lý.");
      if (exercise.includes("Aerobic & nhảy múa")) addAdvice(true, "Hoạt động này giúp đốt cháy năng lượng và cải thiện tâm trạng.");
      if (exercise.includes("Bơi lội")) addAdvice(true, "Bơi lội giúp tăng cường toàn bộ cơ thể và rất tốt cho tim mạch.");
      if (exercise.includes("Thể thao đồng đội")) addAdvice(true, "Thể thao đồng đội không chỉ tốt cho sức khỏe mà còn giúp gắn kết xã hội.");
      if (exercise.includes("Chạy")) addAdvice(true, "Chạy bộ giúp tăng sức bền và giải phóng endorphin, cải thiện tâm trạng.");
      if (exercise.includes("Đạp xe đạp")) addAdvice(true, "Đạp xe là lựa chọn tuyệt vời cho hệ tim mạch và sức khỏe tổng thể.");
      if (exercise.includes("Đi bộ")) addAdvice(true, "Đi bộ mỗi ngày giúp cải thiện tuần hoàn máu.");

      // 🎯 Hoạt động tình dục và nhu cầu tình dục
      if (sexual.includes("Không quan hệ tình dục")) addAdvice(true, "Không quan hệ tình dục cũng là một lựa chọn lành mạnh, quan trọng là bạn cảm thấy thoải mái với quyết định của mình.");
      if (sexual.includes("Thủ dâm")) addAdvice(true, "Thủ dâm ở mức độ vừa phải lành mạnh và giúp giảm căng thẳng.");
      if (sexual.includes("Quan hệ tình dục có bảo vệ")) addAdvice(true, "Sử dụng biện pháp bảo vệ giúp ngăn ngừa mang thai ngoài ý muốn và bệnh lây qua đường tình dục.");
      if (sexual.includes("Quan hệ tình dục không bảo vệ")) addAdvice(true, "Hãy lưu ý nguy cơ mang thai ngoài ý muốn và bệnh lây qua đường tình dục.");
      if (sexual.includes("Quan hệ tình dục bằng miệng")) addAdvice(true, "Quan hệ bằng miệng vẫn có nguy cơ lây bệnh, hãy cân nhắc biện pháp an toàn.");
      if (sexual.includes("Quan hệ tình dục qua đường hậu môn")) addAdvice(true, "Quan hệ qua đường hậu môn có nguy cơ tổn thương và lây bệnh cao, hãy sử dụng biện pháp bảo vệ.");
      if (sexual.includes("Cực khoái")) addAdvice(true, "Cực khoái mang lại nhiều lợi ích cho tinh thần và thể chất, hãy tận hưởng một cách lành mạnh.");
      if (sexual.includes("Nhu cầu tình dục cao")) addAdvice(true, "Đây có thể là dấu hiệu rụng trứng, hoàn toàn bình thường.");
      if (sexual.includes("Nhu cầu tình dục bình thường")) addAdvice(true, "Nhu cầu tình dục ổn định, đây là dấu hiệu tốt cho sức khỏe sinh lý.");
      if (sexual.includes("Nhu cầu tình dục thấp")) addAdvice(true, "Có thể do mệt mỏi hoặc stress, hãy nghỉ ngơi thêm và chăm sóc bản thân.");

      // 🎯 Tiết dịch âm đạo
      vaginalDischargeData.forEach(v => {
          if (["Trắng đục", "Như lòng trắng trứng", "Ẩm ướt", "Dạng dính"].includes(v)) {
              addAdvice(true, "Tiết dịch âm đạo này được xem là bình thường. Đây có thể là dấu hiệu của rụng trứng hoặc chu kỳ kinh nguyệt sắp tới.");
          }
          if (["Trắng vón cục", "Xám", "Bất thường", "Dạng đốm"].includes(v)) {
              addAdvice(true, "Tiết dịch âm đạo có dấu hiệu bất thường. Bạn nên đi khám phụ khoa để được tư vấn và điều trị kịp thời.");
          }
      });

      // 🎯 Dấu hiệu rụng trứng
      ovulationSigns.forEach(o => {
          if (o.includes("Tăng ham muốn tình dục")) addAdvice(true, "Đây là dấu hiệu bình thường trong rụng trứng.");
          if (o.includes("Đau bụng dưới và vùng chậu")) addAdvice(true, "Theo dõi nếu đau kéo dài hoặc dữ dội.");
          if (o.includes("Thay đổi nhiệt độ cơ sở")) addAdvice(true, "Hãy tiếp tục theo dõi nhiệt độ cơ thể hàng ngày để xác định chính xác thời điểm rụng trứng.");
          if (o.includes("Dịch nhầy âm đạo")) addAdvice(true, "Dịch nhầy trong, giống lòng trắng trứng là dấu hiệu rụng trứng bình thường. Hãy theo dõi sự thay đổi của nó.");
          if (o.includes("Xuất hiện đốm máu")) addAdvice(true, "Đốm máu có thể xuất hiện do rụng trứng, thường là một lượng nhỏ và không kéo dài.");
          if (o.includes("Sưng đầu ngực, đau vú")) addAdvice(true, "Các triệu chứng này có thể liên quan đến sự thay đổi hormone trong chu kỳ.");
          if (o.includes("Cổ tử cung mở rộng")) addAdvice(true, "Khi rụng trứng, cổ tử cung sẽ mềm, mở và cao hơn. Đây là một dấu hiệu tốt.");
          if (o.includes("Âm đạo hoặc âm hộ bị sưng")) addAdvice(true, "Sự thay đổi hormone có thể gây sưng nhẹ. Nếu cảm thấy khó chịu, bạn nên tham khảo ý kiến bác sĩ.");
          if (o.includes("Đầy bụng")) addAdvice(true, "Hãy ăn các thực phẩm dễ tiêu và tránh đồ ăn có nhiều gia vị để giảm khó chịu.");
          if (o.includes("Đầy hơi")) addAdvice(true, "Hãy ăn các thực phẩm dễ tiêu và tránh đồ ăn có nhiều gia vị để giảm khó chịu.");
          if (o.includes("Nhức đầu")) addAdvice(true, "Các triệu chứng này có thể liên quan đến rụng trứng hoặc các yếu tố khác. Hãy nghỉ ngơi và uống đủ nước.");
          if (o.includes("Buồn nôn")) addAdvice(true, "Các triệu chứng này có thể liên quan đến rụng trứng hoặc các yếu tố khác. Hãy nghỉ ngơi và uống đủ nước.");
      });

      // 🎯 Cân nặng
      if (rowData['Cân nặng (kg)'] && rowData['Cân nặng (kg)'] !== "Không có") {
          const weightStr = rowData['Cân nặng (kg)'].replace(' kg', '');
          const weight = parseFloat(weightStr);
          if (weight < 45) addAdvice(true, "Cân nặng hơi thấp, chú ý bổ sung dinh dưỡng.");
          if (weight > 70) addAdvice(true, "Bạn nên tập luyện và ăn uống điều độ để giữ cân nặng hợp lý.");
      }

      // 🎯 Thuốc
      if (rowData["Thuốc ngoài"] && rowData["Thuốc ngoài"] !== "Không có") {
          addAdvice(true, `Bạn đang dùng thuốc: ${rowData["Thuốc ngoài"]}. Hãy tuân thủ đúng hướng dẫn.`);
      }
      if (rowData["Thuốc tránh thai đường uống (OC)"] === "Đã uống bù/ quên thuốc") {
          addAdvice(true, "Hãy chú ý uống thuốc đúng giờ để đảm bảo hiệu quả tránh thai.");
      }

      // 🎯 Khác (Thêm các option mới từ form)
      const other = rowData["Khác"];
      if (other.includes("Thiền")) addAdvice(true, "Tuyệt vời! Thiền giúp cân bằng hormone và cảm xúc.");
      if (other.includes("Bài tập Kegel")) addAdvice(true, "Bài tập Kegel rất tốt cho cơ sàn chậu. Tiếp tục duy trì nhé!");
      if (other.includes("Bài tập thở")) addAdvice(true, "Oxy là liều thuốc tự nhiên tốt nhất cho làn da và não bộ.");
      if (other.includes("Căng thẳng")) addAdvice(true, "Hãy ngưng việc đang làm lại và hít thở sâu 5 lần để giảm căng thẳng.");
      if (other.includes("Rượu")) addAdvice(true, "Nhớ uống thêm nước lọc để cơ thể không bị mất nước nhé.");

      if (adviceList.size === 0) {
          return "Không có vấn đề nổi bật nào hôm nay. Hãy tiếp tục duy trì lối sống lành mạnh nhé!";
      }

      return [...adviceList].join('\n');
    }

    document.addEventListener("DOMContentLoaded", () => {
      const radios = document.querySelectorAll('input[type="radio"]');

      radios.forEach((radio) => {

        radio.dataset.state = radio.checked ? "checked" : "unchecked";

        radio.addEventListener("click", function (e) {
          if (this.dataset.state === "checked") {
            this.checked = false;
            this.dataset.state = "unchecked";
          } else {
            const groupName = this.name;
            document.querySelectorAll(`input[name="${groupName}"]`).forEach((r) => {
              r.dataset.state = "unchecked";
            });
            this.dataset.state = "checked";
          }
        });
      });
    });

  </script>
</body>

</html>
